spring:
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      # password: your_password
      lettuce:
        pool:
          max-active: 100
          max-wait: 3000ms
  cache:
    type: caffeine
    cache-names:
      - shopCache
      - userCache
    caffeine:
      spec: initialCapacity=100,maximumSize=500,expireAfterWrite=10m
  datasource:
    url: jdbc:mysql://localhost:3306/hmdp?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  security:
    user:
      name: admin
      password: 123456
  application:
    name: hmdp-server
  quartz:
    job-store-type: jdbc
    auto-startup: true
    wait-for-jobs-to-complete-on-shutdown: true
    properties:
      org:
        quartz:
          scheduler:
            instanceId: AUTO
            instanceName: schedulerName
          jobStore:
            # JobStore 实现类。可见博客：https://blog.csdn.net/weixin_42458219/article/details/122247162
            class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
            isClustered: true # 是集群模式
            clusterCheckinInterval: 15000 # 集群检查频率，单位：毫秒。默认为 15000，即 15 秒
            misfireThreshold: 60000 # misfire 阀值，单位：毫秒。

chenzilin:
  info:
    base-package: cn.iocoder.boot
  security:
    mock-enable: true

springdoc:
  api-docs:
    enabled: true # 开启 OpenAPI 接口文档
  swagger-ui:
    enabled: true # 开启 Swagger-UI 界面
  writer-with-default-pretty-printer: true # 格式化输出 JSON


rocketmq:
  name-server: 127.0.0.1:9876 # 生产环境建议配置多个，用分号隔开
  producer:
    group: g_hmdp_producer    # 必须指定生产者组
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

canal:
  mq:
    topic: canal-test-topic


app:
  cache:
    configs:
      shopCache:
        ttl: 3600
        maxSize: 1000
      userCache:
        ttl: 1800
        maxSize: 200


logging:
  level:
    # 监控整个缓存抽象层的活动
    org.springframework.cache: TRACE
    # 专门监控切面拦截逻辑
    org.springframework.cache.interceptor: TRACE
    # 如果怀疑是配置加载问题，可以监控配置项
    org.springframework.boot.autoconfigure.cache: TRACE