# Spring Boot 应用配置
spring:
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      # password: your_password
      lettuce:
        pool:
          max-active: 500
          max-idle: 100
          min-idle: 20
          max-wait: 1000ms
          time-between-eviction-runs: 60000ms

    # Redis监控配置 - 默认禁用以避免循环依赖
    monitor:
      enabled: false
      metric-prefix: redis
      slow-query-threshold: 100  # 100ms以上认为是慢查询
      health-check-enabled: true
      alert:
        memory-usage-threshold: 80.0  # 内存使用率告警阈值
        error-rate-threshold: 5.0     # 错误率告警阈值

  # 缓存配置
  cache:
    type: caffeine
    cache-names:
      - shopCache
      - userCache
    caffeine:
      spec: initialCapacity=100,maximumSize=500,expireAfterWrite=10m

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/hmdp?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Spring Security 配置
  security:
    user:
      name: admin
      password: 123456

  # 应用名称配置
  application:
    name: hmdp-server

  # MyBatis配置
  mybatis-plus:
    mapper-locations: classpath*:/mapper/**/*.xml
    type-aliases-package: cn.iocoder.boot.hmdianping.dal.dataobject
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

  # Quartz配置 - 使用内存存储避免数据库初始化问题
  quartz:
    job-store-type: memory
    auto-startup: true
    wait-for-jobs-to-complete-on-shutdown: true
    properties:
      org:
        quartz:
          scheduler:
            instanceName: HmdpScheduler
            instanceId: AUTO
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 10
            threadPriority: 5
            threadsInheritContextClassLoaderOfInitializingThread: true

  # 注意：如果仍有循环依赖问题，可以取消注释以下配置
  # main:
  #   allow-circular-references: true

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /

# 日志配置
logging:
  level:
    cn.iocoder.boot: DEBUG
    org.springframework.data.redis: WARN
    # 监控整个缓存抽象层的活动
    org.springframework.cache: TRACE
    # 专门监控切面拦截逻辑
    org.springframework.cache.interceptor: TRACE
    # 如果怀疑是配置加载问题，可以监控配置项
    org.springframework.boot.autoconfigure.cache: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# 应用配置
app:
  name: 黑马点评
  version: 1.0.0
  cache:
    configs:
      shopCache:
        ttl: 3600
        maxSize: 1000
      userCache:
        ttl: 1800
        maxSize: 200

# 自定义配置
chenzilin:
  info:
    base-package: cn.iocoder.boot
  security:
    mock-enable: true

# ID生成器配置
id:
  generator:
    type: snowflake  # snowflake | redis，默认使用雪花算法

# 雪花算法配置
snowflake:
  datacenter-id: 1    # 数据中心ID (0-31)
  machine-id: 1       # 机器ID (0-31)

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true # 开启 OpenAPI 接口文档
  swagger-ui:
    enabled: true # 开启 Swagger-UI 界面
  writer-with-default-pretty-printer: true # 格式化输出 JSON

# RocketMQ 配置
rocketmq:
  name-server: 127.0.0.1:9876 # 生产环境建议配置多个，用分号隔开
  # 生产者通用配置
  producer:
    group: g_hmdp_producer    # 必须指定生产者组
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    max-message-size: 4194304  # 4MB
    compress-message-body-threshold: 4096  # 4KB以上压缩
    retry-next-server: false
    # 允许自动创建Topic（默认是true）
    # auto-create-topic-enable: true
    # 连接池配置
    client:
      client-worker-threads: 4
      client-callback-executor-threads: 4
      client-selector-threads: 1
      client-channel-max-idle-time-seconds: 120
      client-socket-sndbuf-size: 65535
      client-socket-rcvbuf-size: 65535
      client-worker-thread-queue-capacity: 10000

# Canal 配置
canal:
  mq:
    topic: canal-test-topic


rate-limit:
  # 基础开关
  enable-sliding-window: false
  enable-penalty: false

  # 全局 IP 限流配置 (5秒内最多3次)
  ip-window-millis: 5000
  ip-max-attempts: 3

  # 全局用户限流配置 (1分钟内最多5次)
  user-window-millis: 60000
  user-max-attempts: 5

  # 白名单配置 (支持集合格式)
  ip-whitelist:
    - 127.0.0.1
    - 192.168.1.100
  user-whitelist: [1001, 1002, 1003]

  # 惩罚机制 (封禁逻辑)
  violation-window-seconds: 60
  ip-block-threshold: 5
  user-block-threshold: 5
  ip-block-ttl-seconds: 300
  user-block-ttl-seconds: 300

  # 针对具体接口的细粒度限流 (嵌套对象 EndpointLimit)
  issue:
    ip-window-millis: 1000
    ip-max-attempts: 1
    user-window-millis: 10000
    user-max-attempts: 2

  seckill:
    ip-window-millis: 2000
    ip-max-attempts: 2
    user-window-millis: 30000
    user-max-attempts: 1